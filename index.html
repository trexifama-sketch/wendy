<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Wendy 🌌</title>
    <style>
        /* Fondo de Galaxia Realista con Nebulosas */
        body {
            margin: 0;
            padding: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(72, 202, 228, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(114, 9, 183, 0.2) 0%, transparent 50%),
                radial-gradient(circle at center, #0a1128 0%, #020514 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Capas de estrellas con parpadeo realista */
        .stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-repeat: repeat;
            opacity: 0;
            animation: starsParpadeo 4s infinite alternate;
        }

        .stars.layer1 {
            background-image: radial-gradient(1px 1px at 25px 40px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 75px 120px, rgba(255,255,255,0.7), rgba(0,0,0,0));
            background-size: 200px 200px;
        }

        .stars.layer2 {
            background-image: radial-gradient(2px 2px at 50px 160px, #90e0ef, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 130px 40px, #fff, rgba(0,0,0,0));
            background-size: 250px 250px;
            animation-delay: 1.5s;
        }

        @keyframes starsParpadeo {
            0% { opacity: 0.3; }
            100% { opacity: 0.85; }
        }

        /* Estrellas Fugaces sutiles */
        .shooting-star {
            position: absolute;
            background: linear-gradient(90deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 100%);
            width: 1px;
            height: 70px;
            opacity: 0;
            z-index: 2;
            animation: shootingStar 18s infinite;
        }

        .shooting-star:nth-child(1) { top: 15%; left: 10%; animation-delay: 3s; transform: rotate(35deg); }
        .shooting-star:nth-child(2) { top: 40%; left: 65%; animation-delay: 9s; transform: rotate(-40deg); }

        @keyframes shootingStar {
            0% { opacity: 0; transform: translateY(0) rotate(var(--rotation)); width: 0px; }
            1% { opacity: 1; width: 1px; }
            3% { opacity: 0; transform: translateY(200px) rotate(var(--rotation)); width: 0px; }
            100% { opacity: 0; }
        }

        /* Contenido Principal */
        .main-content {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            color: #48cae4;
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(72, 202, 228, 0.6);
        }

        .subtitle {
            color: #90e0ef;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Menú de Botones Estilo Vidrio Flotante */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-menu {
            background: rgba(255, 255, 255, 0.05);
            color: #e0f1f7;
            border: 1px solid rgba(72, 202, 228, 0.3);
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 20px;
            text-decoration: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        /* Color especial para el botón de Ruleta */
        .btn-ruleta {
            background: rgba(114, 9, 183, 0.15); /* Un toque violeta cósmico */
            border-color: rgba(181, 23, 158, 0.5);
            box-shadow: 0 0 15px rgba(181, 23, 158, 0.3);
        }

        .btn-menu:active {
            transform: scale(0.96);
            background: rgba(72, 202, 228, 0.2);
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars layer1"></div>
        <div class="stars layer2"></div>
        <div class="shooting-star" style="--rotation: 35deg;"></div>
        <div class="shooting-star" style="--rotation: -40deg;"></div>
    </div>

    <div class="main-content">
        <h1>Para Wendy 🌌</h1>
        <div class="subtitle">Bienvenida a tu universo</div>

        <div class="menu-container">
            <a href="ruleta.html" class="btn-menu btn-ruleta">🎡 Ruleta de Amor</a>
            
            <a href="#" class="btn-menu">✨ Nuestro Universo</a>
            <a href="#" class="btn-menu">💫 Momentos</a>
            <a href="#" class="btn-menu">🌙 Mensajes</a>
        </div>
    </div>

</body>
</html>
