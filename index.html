<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Wendy 🌌</title>
    <style>
        /* Fondo Espacial Realista y Estático */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0a1128 0%, #000205 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden; /* Evita cualquier movimiento de pantalla */
            position: relative;
        }

        /* Capas de estrellas realistas (Parpadeo suave) */
        .stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .stars {
            position: absolute;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0;
            animation: starsParpadeo 5s infinite;
        }

        .stars.layer1 { animation-delay: 0s; background-size: 150px 150px; }
        .stars.layer2 { animation-delay: 1s; background-size: 250px 250px; radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 30px); }
        .stars.layer3 { animation-delay: 2.5s; background-size: 200px 200px; }

        @keyframes starsParpadeo {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.7; }
        }

        /* Estrella Fugaz Aleatoria y Delicada */
        .shooting-star {
            position: absolute;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            width: 1px;
            height: 80px; /* Más fina y larga */
            opacity: 0;
            z-index: 2;
            animation: shootingStar 20s infinite; /* Aparece cada 20s */
        }

        /* Posiciones aleatorias simuladas con delays y keyframes complejos */
        .shooting-star:nth-child(1) { top: 10%; left: 10%; animation-delay: 2s; transform: rotate(35deg); }
        .shooting-star:nth-child(2) { top: 30%; left: 60%; animation-delay: 8s; transform: rotate(-45deg); height: 60px; }
        .shooting-star:nth-child(3) { top: 70%; left: 20%; animation-delay: 14s; transform: rotate(20deg); height: 100px; }

        @keyframes shootingStar {
            0% { opacity: 0; transform: translateY(0) rotate(var(--rotation)); width: 0px; }
            1% { opacity: 1; width: 1px; }
            3% { opacity: 0; transform: translateY(300px) rotate(var(--rotation)); width: 0px; }
            100% { opacity: 0; }
        }

        /* Contenido Principal (Fijo) */
        .main-content {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            color: #48cae4;
            font-size: 3rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(72, 202, 228, 0.8);
        }

        .subtitle {
            color: #90e0ef;
            font-size: 1.2rem;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* Menú de Botones Estilo Vidrio (Como en la imagen) */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-menu {
            background: rgba(255, 255, 255, 0.03);
            color: #e0f1f7;
            border: 1px solid rgba(72, 202, 228, 0.2);
            padding: 18px 25px;
            font-size: 1.2rem;
            font-weight: 500;
            border-radius: 20px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Efecto de brillo sutil al tocar */
        .btn-menu:active {
            transform: scale(0.97);
            background: rgba(72, 202, 228, 0.15);
            border-color: rgba(72, 202, 228, 0.6);
            box-shadow: 0 0 20px rgba(72, 202, 228, 0.4);
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars layer1"></div>
        <div class="stars layer2"></div>
        <div class="stars layer3"></div>
        <div class="shooting-star" style="--rotation: 35deg;"></div>
        <div class="shooting-star" style="--rotation: -45deg;"></div>
        <div class="shooting-star" style="--rotation: 20deg;"></div>
    </div>

    <div class="main-content">
        <h1>Para Wendy 🌌</h1>
        <div class="subtitle">Tu propio pedacito de universo</div>

        <div class="menu-container">
            <a href="#" class="btn-menu">✨ Nuestro Universo de Amor</a>
            <a href="#" class="btn-menu">💫 Momentos y Recuerdos</a>
            <a href="#" class="btn-menu">🌙 Mensajes para Ti</a>
        </div>
    </div>

</body>
</html>
